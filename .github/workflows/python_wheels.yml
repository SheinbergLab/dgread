# Build Python wheels and publish to PyPI

name: Python Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to PyPI (yes/no)'
        required: true
        default: 'no'
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'python/**'
      - '.github/workflows/python_wheels.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'python/**'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install zlib (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install zlib:x64-windows
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        with:
          package-dir: python
        env:
          CIBW_ENVIRONMENT_WINDOWS: >
            VCPKG_ROOT=C:\vcpkg
            INCLUDE=C:\vcpkg\installed\x64-windows\include
            LIB=C:\vcpkg\installed\x64-windows\lib

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create sdist with all sources
        run: |
          pip install build
          cd python
          python -m build --sdist
          mv dist ../

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'yes')
    
    permissions:
      id-token: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1